server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API: /api/* -> backend, sacando el prefijo /api (por la barra final en proxy_pass)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # El service worker no debe cachearse, para que las actualizaciones tomen efecto
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA: cualquier ruta que no sea un archivo cae a index.html (Vue Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
