name: Deploy to prod (UM-CLOUD VM)

on:
  push:
    tags:
      - "v*"

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Conectar a Tailscale (efimero)
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VM_TS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull + build en la VM
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.SSH_USER }}@${{ secrets.VM_TS_HOST }}" \
            "set -e && cd ~/irrigation-advisor && \
             git fetch --tags --prune && \
             git checkout --force ${{ github.ref_name }} && \
             docker compose up -d --build && \
             docker image prune -f"
